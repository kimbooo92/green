<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title id="tabTitle"></title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" type="text/css" />
        <!-- Google fonts-->
        <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700,300italic,400italic,700italic" rel="stylesheet" type="text/css" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
    </head>
    <body>
        <!-- Navigation-->
        <nav class="navbar navbar-light bg-light static-top">
            <div class="container">
                <a class="btn btn-primary" href="#intro" id="navOne"></a>
                <a class="btn btn-primary" href="#impacts" id="navTwo"></a>
                <a class="btn btn-primary" href="#opinion" id="navThree"></a>
                <a class="btn btn-primary" href="#preuve" id="navFour"></a>
                <a class="btn btn-primary" href="#conclusion" id="navFive"></a>
                <a class="btn btn-primary" href="#chanson" id="navSix"></a>
                <a class="btn btn-primary" href="#biblio" id="navSeven"></a>
        </nav>
        <!-- Title -->
        <header class="masthead">
            <div class="container position-relative">
                <div class="row justify-content-center">
                    <div class="col-xl-6">
                        <div class="text-center text-white">
                            <!-- Page heading-->
                            <h1 class="mb-5" id="pageHeading"></h1>
                        </div>
                    </div>
                </div>
            </div>
        </header>
        <!-- Introduction Section -->
        <section class="showcase" id="intro">
            <div class="container-fluid p-0">
                <div class="row g-0">
                    <div class="col-lg-6 order-lg-2 text-white showcase-img" style="background-image: url('assets/img/image5.png')"></div>
                    <div class="col-lg-6 order-lg-1 my-auto showcase-text">
                        <h2 id="introTitle"></h2>
                        <p class="lead mb-0" id="introParagraph"></p>
                    </div>
                </div>
            </div>
        </section>
        <!-- Impacts Section -->
        <section class="features-icons bg-light text-center" id="impacts">
            <h2 class="header-colour" id="impactsTitle"></h2>
            <div class="container">
                <div class="row">
                    <div class="col">
                        <div>
                            <h3 class="header-colour" id="positiveImpactsTitle"></h3>
                            <img src="assets/img/image2.png" alt="Feature 1" class="feature-img">
                            <p class="paragraph-colour" id="positiveImpactsParagraph"></p>
                        </div>
                    </div>

                    <div class="col">
                        <div>
                            <h3 class="header-colour" id="negativeImpactsTitle"></h3>
                            <img src="assets/img/image3.png" alt="Feature 2" class="feature-img">
                            <p class="paragraph-colour" id="negativeImpactsParagraph"></p>
                        </div>
                    </div>

                    <div class="col">
                        <div>
                            <h3 class="header-colour" id="conclusionsTitle"></h3>
                            <img src="assets/img/image4.png" alt="Feature 3" class="feature-img">
                            <p class="paragraph-colour" id="conclusionsParagraph"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- Notre Opinion Section -->
        <section class="showcase" id="opinion">
            <div class="container-fluid p-0">

                <!-- Title (now properly above + black) -->
                <h2 class="header-colour text-dark" id="opinionsTitle"></h2>

                <div class="row g-0">

                <!-- Left column -->
                <div class="col-lg-6 my-auto showcase-text">
                    <h2 id="argumentsTitle"></h2>
                    <p class="lead mb-0 text-dark" id="argumentsParagraph"></p>
                </div>

                <!-- Right column -->
                <div class="col-lg-6 my-auto showcase-text">
                    <h2 id="explicationTitle"></h2>
                    <p class="lead mb-0 text-dark" id="explicationParagraph"></p>
                </div>

                </div>

            </div>
        </section>
        <!-- Preuve Section -->
        <!-- Conclusion Section -->
        <section class="showcase" id="conclusion">
            <div class="container-fluid p-0">
                <div class="row g-0">
                    <div class="col-lg-6 order-lg-1 my-auto showcase-text">
                        <h2 id="conclusionsSectionTitle"></h2>
                        <p class="lead mb-0" id="conclusionsSectionParagraph"></p>
                    </div>
                </div>
            </div>
        </section>
        <!-- Chanson Section -->
        <!-- Bibliographic Section -->
        <section class="showcase" id="biblio">
            <div class="container-fluid p-0">
                <div class="row g-0">
                    <div class="col-lg-6 order-lg-1 my-auto showcase-text">
                        <h2 id="biblioTitle"></h2>
                        <p class="lead mb-0" id="biblioParagraph"></p>
                    </div>
                </div>
            </div>
        </section>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="js/scripts.js"></script>
        <script>
            document.getElementById("tabTitle").textContent = APP_CONSTANTS.tabTitle;

            document.getElementById("navOne").textContent = APP_CONSTANTS.navigation[0];
            document.getElementById("navTwo").textContent = APP_CONSTANTS.navigation[1];
            document.getElementById("navThree").textContent = APP_CONSTANTS.navigation[2];
            document.getElementById("navFour").textContent = APP_CONSTANTS.navigation[3];
            document.getElementById("navFive").textContent = APP_CONSTANTS.navigation[4];
            document.getElementById("navSix").textContent = APP_CONSTANTS.navigation[5];
            document.getElementById("navSeven").textContent = APP_CONSTANTS.navigation[6];

            document.getElementById("pageHeading").textContent = APP_CONSTANTS.pageHeading;

            document.getElementById("introTitle").textContent = APP_CONSTANTS.introTitle;
            document.getElementById("introParagraph").textContent = APP_CONSTANTS.introParagraph;

            document.getElementById("impactsTitle").textContent = APP_CONSTANTS.impactsTitle;
            document.getElementById("positiveImpactsTitle").textContent = APP_CONSTANTS.positiveImpactsTitle;
            document.getElementById("positiveImpactsParagraph").textContent = APP_CONSTANTS.positiveImpactsParagraph;
            document.getElementById("negativeImpactsTitle").textContent = APP_CONSTANTS.negativeImpactsTitle;
            document.getElementById("negativeImpactsParagraph").textContent = APP_CONSTANTS.negativeImpactsParagraph;
            document.getElementById("conclusionsTitle").textContent = APP_CONSTANTS.conclusionsTitle;
            document.getElementById("conclusionsParagraph").textContent = APP_CONSTANTS.conclusionsParagraph;

            document.getElementById("opinionsTitle").textContent = APP_CONSTANTS.opinionsTitle;
            document.getElementById("argumentsTitle").textContent = APP_CONSTANTS.argumentsTitle;
            document.getElementById("argumentsParagraph").textContent = APP_CONSTANTS.argumentsParagraph;
            document.getElementById("explicationTitle").textContent = APP_CONSTANTS.explicationTitle;
            document.getElementById("explicationParagraph").textContent = APP_CONSTANTS.explicationParagraph;

            document.getElementById("conclusionsSectionTitle").textContent = APP_CONSTANTS.conclusionsSectionTitle;
            document.getElementById("conclusionsSectionParagraph").textContent = APP_CONSTANTS.conclusionsSectionParagraph;

            document.getElementById("biblioTitle").textContent = APP_CONSTANTS.biblioTitle;
            document.getElementById("biblioParagraph").textContent = APP_CONSTANTS.biblioParagraph;
        </script>
        <!-- * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * *-->
        <!-- * *                               SB Forms JS                               * *-->
        <!-- * * Activate your form at https://startbootstrap.com/solution/contact-forms * *-->
        <!-- * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * *-->
        <script src="https://cdn.startbootstrap.com/sb-forms-latest.js"></script>
    </body>
</html>
